<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login • NovaCode</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="glass">
        <div class="logo">NovaCode</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="courses.html">Courses</a>
            <a href="paths.html">Paths</a>
            <a href="community.html">Community</a>
            <a href="blog.html">Blog</a>
        </nav>
        <div class="header-actions">
            <button class="cta-header cta-cyan">Sign Up</button>
        </div>
    </header>

    <div class="header-spacer"></div>

    <!-- Login Hero / Form -->
    <section class="auth-hero auth-login">
        <div class="auth-container">
            <div class="auth-card glass">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Log in to continue your coding journey</p>

                <form class="auth-form">
                    <div class="form-group">
                        <input type="email" id="email" class="form-input" placeholder=" " required>
                        <label for="email" class="form-label">Email address</label>
                    </div>

                    <div class="form-group">
                        <input type="password" id="password" class="form-input" placeholder=" " required>
                        <label for="password" class="form-label">Password</label>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-primary purple auth-submit">
                        Log In
                    </button>
                </form>

                <p class="auth-switch">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </p>
            </div>

            <!-- Subtle floating elements -->
            <div class="auth-float auth-float-1"></div>
            <div class="auth-float auth-float-2"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-grid">
            <div>
                <div class="logo">NovaCode</div>
                <p class="footer-tagline">Modern coding education for beginners.</p>
            </div>
            <div>
                <h4 class="footer-heading">Explore</h4>
                <a href="index.html">Home</a>
                <a href="courses.html">Courses</a>
                <a href="paths.html">Paths</a>
                <a href="community.html">Community</a>
                <a href="blog.html">Blog</a>
            </div>
            <div>
                <h4 class="footer-heading">Company</h4>
                <a href="#">About</a>
            </div>
        </div>
        <div class="footer-bottom">
            © 2026 NovaCode
        </div>
    </footer>

</body>
</html>
