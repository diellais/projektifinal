<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign Up • NovaCode</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="glass">
        <div class="logo">NovaCode</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="courses.html">Courses</a>
            <a href="paths.html">Paths</a>
            <a href="community.html">Community</a>
            <a href="blog.html">Blog</a>
        </nav>
        <div class="header-actions">
            <button class="cta-header">Login</button>
        </div>
    </header>

    <div class="header-spacer"></div>

    <!-- Sign Up Hero / Form -->
    <section class="auth-hero auth-signup">
        <div class="auth-container">
            <div class="auth-card glass">
                <h1 class="auth-title">Create Your Account</h1>
                <p class="auth-subtitle">Join thousands learning to code for free</p>

                <form class="auth-form">
                    <div class="form-group">
                        <input type="text" id="username" class="form-input" placeholder=" " required>
                        <label for="username" class="form-label">Username</label>
                    </div>

                    <div class="form-group">
                        <input type="email" id="email" class="form-input" placeholder=" " required>
                        <label for="email" class="form-label">Email address</label>
                    </div>

                    <div class="form-group">
                        <input type="password" id="password" class="form-input" placeholder=" " required>
                        <label for="password" class="form-label">Password</label>
                    </div>

                    <div class="form-group">
                        <input type="password" id="confirm-password" class="form-input" placeholder=" " required>
                        <label for="confirm-password" class="form-label">Confirm password</label>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" required>
                            <span>I agree to the <a href="#">Terms</a> & <a href="#">Privacy Policy</a></span>
                        </label>
                    </div>

                    <button type="submit" class="btn-primary purple auth-submit">
                        Create Account
                    </button>
                </form>

                <p class="auth-switch">
                    Already have an account? <a href="login.html">Log in</a>
                </p>
            </div>

            <!-- Floating elements -->
            <div class="auth-float auth-float-1"></div>
            <div class="auth-float auth-float-2"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-grid">
            <div>
                <div class="logo">NovaCode</div>
                <p class="footer-tagline">Modern coding education for beginners.</p>
            </div>
            <div>
                <h4 class="footer-heading">Explore</h4>
                <a href="index.html">Home</a>
                <a href="courses.html">Courses</a>
                <a href="paths.html">Paths</a>
                <a href="community.html">Community</a>
                <a href="blog.html">Blog</a>
            </div>
            <div>
                <h4 class="footer-heading">Company</h4>
                <a href="#">About</a>
            </div>
        </div>
        <div class="footer-bottom">
            © 2026 NovaCode
        </div>
    </footer>

</body>
</html>
